<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIPAD - Map</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Fira Sans', sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top navbar ── */
    .topbar {
      display: flex;
      align-items: stretch;
      height: 52px;
      flex-shrink: 0;
      z-index: 10;
    }

    .topbar-bipad {
      background-color: #1a56b0;
      color: #fff;
      font-size: 20px;
      font-weight: 700;
      padding: 0 22px;
      display: flex;
      align-items: center;
      letter-spacing: 1px;
      min-width: 170px;
    }

    .topbar-section {
      background-color: #cc1a1a;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 0 22px;
      display: flex;
      align-items: center;
      flex: 1;
    }

    .topbar-lang {
      background-color: #fff;
      margin-left: auto;
      display: flex;
      align-items: center;
      padding: 0 14px;
      border-left: 1px solid #ddd;
    }

    .lang-btn {
      border: 1.5px solid #1a56b0;
      color: #1a56b0;
      background: #fff;
      font-size: 13px;
      font-weight: 700;
      padding: 3px 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ── Body layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left sidebar ── */
    .left-sidebar {
      width: 170px;
      background: #fff;
      border-right: 1px solid #e0e0e0;
      flex-shrink: 0;
      padding-top: 18px;
    }

    .left-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      font-size: 15px;
      color: #1a56b0;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    .left-nav-item .grid-icon {
      display: grid;
      grid-template-columns: repeat(2, 8px);
      grid-template-rows: repeat(2, 8px);
      gap: 2px;
    }

    .left-nav-item .grid-icon span {
      width: 8px;
      height: 8px;
      background-color: #1a56b0;
      border-radius: 1px;
      display: block;
    }

    /* ── Main content ── */
    .main-content {
      flex: 1;
      overflow: hidden;
      background-color: #000;
      position: relative;
      display: flex;
    }

    .main-content.blurred { filter: blur(4px); }

    #map-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      display: none;
    }

    /* ── Choice modal ── */
    .choice-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.35);
    }

    .choice-modal {
      background: #fff;
      border-radius: 8px;
      padding: 40px 44px 36px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 12px 40px rgba(0,0,0,0.22);
      text-align: center;
    }

    .choice-modal h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a56b0;
      margin-bottom: 8px;
    }

    .choice-modal p {
      font-size: 13px;
      color: #777;
      margin-bottom: 32px;
    }

    .choice-cards {
      display: flex;
      gap: 18px;
      justify-content: center;
    }

    .choice-card {
      flex: 1;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 28px 16px 22px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      background: #fafafa;
    }

    .choice-card:hover {
      border-color: #1a56b0;
      box-shadow: 0 4px 18px rgba(26,86,176,0.13);
      transform: translateY(-2px);
    }

    .choice-card svg {
      display: block;
      color: #1a56b0;
    }

    .choice-card-title {
      font-size: 14px;
      font-weight: 700;
      color: #222;
      line-height: 1.3;
    }

    .choice-card-sub {
      font-size: 11.5px;
      color: #888;
      margin-top: -8px;
    }

    /* ── Right sidebar ── */
    .right-sidebar {
      width: 62px;
      background: #2e2e2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
      gap: 0;
      flex-shrink: 0;
    }

    .right-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px 6px;
      cursor: pointer;
      color: #ccc;
      font-size: 9.5px;
      text-align: center;
      gap: 4px;
      border-bottom: 1px solid #3a3a3a;
      text-decoration: none;
      line-height: 1.2;
    }

    .right-nav-item:hover { background-color: #3a3a3a; color: #fff; }
    .right-nav-item svg { display: block; }
    .right-nav-item.active { color: #fff; }

    .right-spacer { flex: 1; }

    .right-nav-item.login { border-top: 1px solid #3a3a3a; border-bottom: none; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-bipad">BIPAD</div>
    <div class="topbar-section">DRRM Data Profile</div>
    <div class="topbar-lang">
      <button class="lang-btn">
        EN
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#1a56b0" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
  </div>

  <!-- Layout -->
  <div class="layout">

    <!-- Left Sidebar -->
    <aside class="left-sidebar">
      <a class="left-nav-item" href="faofda/index.html">
        <div class="grid-icon">
          <span></span><span></span>
          <span></span><span></span>
        </div>
        DashBoard
      </a>
      <a class="left-nav-item active" href="#" onclick="openChoiceModal(); return false;">
        <div class="grid-icon">
          <span></span><span></span>
          <span></span><span></span>
        </div>
        Map
      </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content blurred" id="main-content">
      <img id="map-img" src="" alt="">
    </main>

    <!-- Right Sidebar -->
    <aside class="right-sidebar">
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Incident
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Damage &amp; Loss
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
        Realtime
      </a>
      <a class="right-nav-item active" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="8" y1="12" x2="8" y2="17"/><line x1="12" y1="8" x2="12" y2="17"/><line x1="16" y1="14" x2="16" y2="17"/></svg>
        Profile
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Risk Info
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Data Archive
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        VisRisk
      </a>
      <a class="right-nav-item" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>
        IBF
      </a>
      <div class="right-spacer"></div>
      <a class="right-nav-item login" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Login
      </a>
    </aside>

  </div><!-- /layout -->

  <!-- Choice Modal -->
  <div class="choice-overlay" id="choice-overlay">
    <div class="choice-modal">
      <h2>Select Analysis Type</h2>
      <p>Choose how you would like to analyse the area</p>
      <div class="choice-cards">

        <div class="choice-card" onclick="launchAnalysis('satellite')">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="3"/>
            <path d="M6.3 6.3a8 8 0 0 0 0 11.4"/>
            <path d="M17.7 6.3a8 8 0 0 1 0 11.4"/>
            <path d="M3.5 3.5a14 14 0 0 0 0 17"/>
            <path d="M20.5 3.5a14 14 0 0 1 0 17"/>
          </svg>
          <div class="choice-card-title">Satellite Analysis</div>
          <div class="choice-card-sub">Remote sensing imagery</div>
        </div>

        <div class="choice-card" onclick="launchAnalysis('uav')">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2L8 6H4v2l3 1-3 3h4l1 3 3-3 3 3 1-3h4l-3-3 3-1V6h-4L12 2z"/>
            <circle cx="12" cy="10" r="2"/>
            <path d="M12 16v6"/>
            <path d="M9 22h6"/>
          </svg>
          <div class="choice-card-title">UAV / Drone Analysis</div>
          <div class="choice-card-sub">3 regions available</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    function openChoiceModal() {
      const overlay = document.getElementById('choice-overlay');
      const main    = document.getElementById('main-content');
      overlay.style.display = 'flex';
      main.classList.add('blurred');
    }

    function launchAnalysis(type) {
      const overlay = document.getElementById('choice-overlay');
      const main    = document.getElementById('main-content');
      const img     = document.getElementById('map-img');

      img.src = type === 'uav' ? 'uav.png' : 'satellite-map.png';
      img.style.display = 'block';
      main.classList.remove('blurred');
      overlay.style.display = 'none';
    }

    // Auto-launch if redirected from "View on Map"
    if (new URLSearchParams(window.location.search).get('auto') === 'satellite') {
      document.addEventListener('DOMContentLoaded', function() {
        launchAnalysis('satellite');
      });
    }
  </script>

</body>
</html>
